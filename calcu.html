<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #111;
            font-family: Arial, sans-serif;
        }
        .layout {
            display: grid;
            grid-template-columns: 2fr 2fr 2fr 2fr;
            gap: 5px;
            background-color: rgba(4, 114, 141, 0.923);
            height: 800px;
            width: 400px;
            padding: 5px;
        }
        .layout > div {
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 45px;
            color: rgb(243, 241, 232);
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
        }
        .item1 {
            grid-row-start: 1;
            grid-column-start: 1;
            grid-column-end: 5;
            background-color: black;
            justify-content: flex-end;
            padding: 0 15px;
            font-size: 40px;
            overflow: hidden;
            white-space: nowrap;
            cursor: default;
        }
        .item5 {
            background-color: crimson;
            justify-content: center;
            grid-row-start: 3;
            grid-row-end: 7;
            grid-column-start: 4;
        }
        .item2 {
            background-color: grey;
        }
        .item2:hover {
            background-color: #6b6b6b;
        }
        .item3 {
            background-color: burlywood;
        }
        .item3:hover {
            background-color: #c9a876;
        }
        .item5:hover {
            background-color: #b5102f;
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="item1" id="output">0</div>

        <div class="item2" data-op="+">+</div>
        <div class="item2" data-op="-">-</div>
        <div class="item2" data-op="*">*</div>
        <div class="item2" data-op="/">/</div>

        <div class="item3" data-num="7">7</div>
        <div class="item3" data-num="8">8</div>
        <div class="item3" data-num="9">9</div>
        <div class="item5" id="equals">=</div>

        <div class="item3" data-num="6">6</div>
        <div class="item3" data-num="5">5</div>
        <div class="item3" data-num="4">4</div>

        <div class="item3" data-num="3">3</div>
        <div class="item3" data-num="2">2</div>
        <div class="item3" data-num="1">1</div>

        <div class="item3" id="clear">AC</div>
        <div class="item3" data-num=".">.</div>
        <div class="item3" data-num="0">0</div>
    </div>

    <script>
        const output = document.getElementById('output');

        let current = '0';
        let previous = null;
        let operator = null;
        let resetNext = false;

        function updateDisplay() {
            output.textContent = current;
        }

        function inputNumber(num) {
            if (resetNext) {
                current = '0';
                resetNext = false;
            }
            if (num === '.' && current.includes('.')) return;
            if (current === '0' && num !== '.') {
                current = num;
            } else {
                current += num;
            }
            updateDisplay();
        }

        function inputOperator(op) {
            if (operator !== null && !resetNext) {
                calculate();
            }
            previous = current;
            operator = op;
            resetNext = true;
        }

        function calculate() {
            if (operator === null || previous === null) return;
            const a = parseFloat(previous);
            const b = parseFloat(current);
            let result;
            switch (operator) {
                case '+': result = a + b; break;
                case '-': result = a - b; break;
                case '*': result = a * b; break;
                case '/': result = b === 0 ? 'Error' : a / b; break;
                default: return;
            }
            current = (typeof result === 'number') ? String(Math.round(result * 1e10) / 1e10) : result;
            operator = null;
            previous = null;
            resetNext = true;
            updateDisplay();
        }

        function clearAll() {
            current = '0';
            previous = null;
            operator = null;
            resetNext = false;
            updateDisplay();
        }

        document.querySelectorAll('[data-num]').forEach(btn => {
            btn.addEventListener('click', () => inputNumber(btn.dataset.num));
        });

        document.querySelectorAll('[data-op]').forEach(btn => {
            btn.addEventListener('click', () => inputOperator(btn.dataset.op));
        });

        document.getElementById('equals').addEventListener('click', calculate);
        document.getElementById('clear').addEventListener('click', clearAll);

        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') inputNumber(e.key);
            else if (e.key === '.') inputNumber('.');
            else if (['+', '-', '*', '/'].includes(e.key)) inputOperator(e.key);
            else if (e.key === 'Enter' || e.key === '=') calculate();
            else if (e.key === 'Escape') clearAll();
        });
    </script>
</body>
</html>
